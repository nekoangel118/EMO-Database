name: Generate Metadata

on:
  push:
    paths:
      - "data/**"
      - "scripts/**"
      - "metadata/**.txt"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install pandas

    - name: Run metadata generator
      run: |
        python "scripts/metadata generation.py"

    - name: Commit updated metadata
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add metadata/*.txt
        git commit -m "Auto-update metadata" || echo "No changes to commit"

        # 必须先 fetch，否则 pull 会失败
        git fetch origin

        # 必须指定 origin main，否则 GitHub Actions 不知道 pull 哪个分支
        git pull --rebase origin main || echo "No remote changes to rebase"

        git push origin main
